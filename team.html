<!DOCTYPE html>
<html>
<head>
	<!-- META ATTRIBUTES -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- WEBSITE -->
	<title>Intramurals '26 - OBSA Games</title>
	<link rel="icon" type="image/x-icon" href="favicon.png">

	<!-- PYTHON -->
	<link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
	<script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

	<!-- BS5 -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

	<!-- CSS -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div id="particles"></div>

	<!-- NAVBAR -->
	<nav class="navbar navbar-expand-lg fixed-top px-5 py-3">
		<div class="container-fluid">
			<a class="navbar-brand" href="index.html">
				<img src="butterfly-b.svg" id="butterflyImg"></img> <span class="ms-2">OBSA GAMES</span>
			</a>
			<button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse"
				data-bs-target="#collapsibleNavbar" aria-controls="collapsibleNavbar"
				aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="collapsibleNavbar">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item mx-2">
						<a class="nav-link" href="team.html">TEAM</a>
					</li>
					<li class="nav-item mx-2">
						<a class="nav-link" href="players.html">PLAYERS</a>
					</li>
					<li class="nav-item mx-2">
						<a class="nav-link" href="signup.html">SIGN-UP</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="team-wrapper">
		<div class="container animate__animated animate__fadeIn">
			<!-- TEAM CHECKER -->
			<div class="row justify-content-center">
				<div class="col-12 col-md-9 col-lg-7">
					<div class="chk-layout">
						<div class="chk-form-panel">
							<div class="intra-card">
								<div class="card-section-title fw-bold">
									<span>🦋</span> STUDENT INFORMATION
								</div>

								<!-- FORM -->
								<div class="mb-4">
									<label class="chk-item">
										<input type="checkbox" name="register" id="registered"/>
										<span class="chk-label">Student is registered online</span>
									</label>
									<label class="chk-item">
										<input type="checkbox" name="clear" id="medical"/>
										<span class="chk-label">Student has medical clearance</span>
									</label>
								</div>

								<!-- GRADE AND SECTION -->
								<div class="row g-3 mb-2">
									<div class="col-6">
										<label class="field-label d-block">Grade Level</label>
										<select class="intra-select form-select" id="level">
											<option value="">Select Grade</option>
											<option value="7">Grade 7</option>
											<option value="8">Grade 8</option>
											<option value="9">Grade 9</option>
											<option value="10">Grade 10</option>
										</select>
									</div>
									<div class="col-6">
										<label class="field-label d-block">Section</label>
										<select class="intra-select form-select" id="section">
											<option value="">Select Section</option>
											<option value="emerald">Emerald</option>
											<option value="ruby">Ruby</option>
										</select>
									</div>
								</div>

								<!-- BUTTON -->
								<button class="btn-intra mt-3" py-click="intrams_checker">
									<span>CHECK YOUR TEAM</span>
								</button>
							</div>
						</div>
						<div class="chk-result-panel">
							<!-- RESULT, DETAILED IN PYTHON -->
							<div id="result" class="mt-4">
								<div id="image"></div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		const pc = document.getElementById('particles');
		const cols = ['#EA4335','#FBBC04','#4285F4','#34A853'];
		for (let i = 0; i < 32; i++) {
			const p = document.createElement('div');
			p.className = 'particle';
			p.style.left = Math.random() * 100 + '%';
			p.style.width = (2 + Math.random() * 3.5) + 'px';
			p.style.height = p.style.width;
			p.style.background = cols[Math.floor(Math.random() * cols.length)];
			p.style.animationDuration = (10 + Math.random() * 16) + 's';
			p.style.animationDelay = (Math.random() * 16) + 's';
			pc.appendChild(p);
		}
	</script>
	<py-script src="2.py"></py-script>
</body>
</html>
